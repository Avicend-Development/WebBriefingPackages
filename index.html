<?php
$directory = __DIR__;
$allItems = @glob($directory . DIRECTORY_SEPARATOR . '*.html');
$files = [];

if ($allItems !== false) {
    foreach ($allItems as $path) {
        if (is_file($path)) {
            $name = basename($path);
            if (strtolower($name) !== 'index.html') {
                $files[] = $name;
            }
        }
    }
}

natcasesort($files);
$files = array_values($files);
?>

        <ul>
          <?php foreach ($files as $file): ?>
            <li>
              <a class="file-link" href="<?= htmlspecialchars($file, ENT_QUOTES, 'UTF-8') ?>">
