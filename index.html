<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Briefing Viewer</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #10233d;
      --muted: #5f7086;
      --accent: #1e6fa8;
      --border: #d9e2ec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px 24px;
    }

    .topbar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 8px 24px rgba(16, 35, 61, 0.06);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    label {
      font-weight: 600;
    }

    select, a.button {
      font: inherit;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      text-decoration: none;
    }

    a.button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .viewer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(16, 35, 61, 0.06);
    }

    .viewer-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 85vh;
      border: 0;
      background: #fff;
    }

    .status {
      color: var(--muted);
      padding: 14px 16px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: #fafcff;
    }

    code {
      background: #eef6fc;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Briefing Viewer</h1>
      <p>Choose a briefing from the <code>briefings</code> folder. The selected HTML file is shown below, and you can switch to another one at any time.</p>
      <div id="controls" class="status">Loading briefings...</div>
    </div>

    <div class="viewer-card">
      <div class="viewer-header" id="current-file">No briefing selected</div>
      <iframe id="viewer" title="Briefing viewer"></iframe>
    </div>
  </div>

  <script>
    async function initViewer() {
      const controls = document.getElementById("controls");
      const viewer = document.getElementById("viewer");
      const currentFile = document.getElementById("current-file");

      try {
        const response = await fetch("./briefings/files.json");
        if (!response.ok) throw new Error("Could not load briefings/files.json");

        const files = await response.json();
        const htmlFiles = files
          .filter(name => typeof name === "string" && name.toLowerCase().endsWith(".html"))
          .sort((a, b) => a.localeCompare(b));

        if (!htmlFiles.length) {
          controls.textContent = "No HTML briefing files found in briefings/files.json.";
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const requested = params.get("file");
        const selectedFile = htmlFiles.includes(requested) ? requested : htmlFiles[0];

        const label = document.createElement("label");
        label.setAttribute("for", "briefing-select");
        label.textContent = "Briefing";

        const select = document.createElement("select");
        select.id = "briefing-select";

        htmlFiles.forEach(file => {
          const option = document.createElement("option");
          option.value = file;
          option.textContent = file;
          if (file === selectedFile) option.selected = true;
          select.appendChild(option);
        });

        const openLink = document.createElement("a");
        openLink.className = "button";
        openLink.target = "_blank";
        openLink.rel = "noopener noreferrer";
        openLink.textContent = "Open file directly";

        const controlsWrap = document.createElement("div");
        controlsWrap.className = "controls";
        controlsWrap.appendChild(label);
        controlsWrap.appendChild(select);
        controlsWrap.appendChild(openLink);

        controls.replaceWith(controlsWrap);

        function showFile(file) {
          const path = "./briefings/" + file;
          viewer.src = path;
          currentFile.textContent = "Showing: " + file;
          openLink.href = path;

          const url = new URL(window.location.href);
          url.searchParams.set("file", file);
          window.history.replaceState({}, "", url);
        }

        select.addEventListener("change", () => {
          showFile(select.value);
        });

        showFile(selectedFile);
      } catch (error) {
        controls.textContent = "Could not load the briefing list.";
        currentFile.textContent = "Viewer unavailable";
      }
    }

    initViewer();
  </script>
</body>
</html>
